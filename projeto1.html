<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="stylesheet" href="1.css" />
    <title>Pagina de Login | Gui</title>
  </head>

  <body>
    <div class="container" id="container">
      <div class="form-container sign-up">
        <form>
          <h1>Criar Conta</h1>
          <div class="social-icons">
            <a href="#" class="icon"
              ><i class="fa-brands fa-google-plus-g"></i
            ></a>
            <a href="#" class="icon"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#" class="icon"><i class="fa-brands fa-github"></i></a>
            <a href="#" class="icon"
              ><i class="fa-brands fa-linkedin-in"></i
            ></a>
          </div>
          <span>use o email para se registrar</span>
          <input type="text" espaço reservado="Name" />
          <input type="email" espaço reservado="Email" />
          <input type="password" espaço reservado="Password" />
          <button>Inscrever-se</button>
        </form>
      </div>
      <div class="form-container Sign-in">
        <form>
          <h1>Entrar</h1>
          <div class="social-icons">
            <a href="#" class="icon"
              ><i class="fa-brands fa-google-plus-g"></i
            ></a>
            <a href="#" class="icon"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#" class="icon"><i class="fa-brands fa-github"></i></a>
            <a href="#" class="icon"
              ><i class="fa-brands fa-linkedin-in"></i
            ></a>
          </div>
          <span>use sua senha de e-mail</span>
          <input type="email" espaço reservado="Email" />
          <input type="password" espaço reservado="Password" />
          <a href="#">Esqueça sua senha?</a>
          <button>Entrar</button>
        </form>
      </div>
      <div class="toggle-container">
        <div class="toggle">
          <div class="toggle-panel toggle-left">
            <h1>Bem vindo de volta!</h1>
            <p>
              Insira seus dados pessoais para usar todos os recursos do site
            </p>
            <button class="hidden" id="login">Entrar</button>
          </div>
          <div class="toggle-panel toggle-right">
            <h1>Bem Vindo!</h1>
            <p>
              Cadastre-se com seus dados pessoais para usar todos os recursos do
              site
            </p>
            <button class="hidden" id="register">Inscrever-se</button>
          </div>
        </div>
      </div>
    </div>

    <script src="1.js"></script>
  </body>
</html>
